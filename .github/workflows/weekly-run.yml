name: Weekly leaderboard run

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with raucle-detect
        run: pip install -e '.[raucle]'
      - name: Run benchmark
        run: raucle-bench
      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "raucle-bench-bot"
          git config user.email "oss@raucle.io"
          if git diff --quiet results/; then
            echo "No leaderboard changes."
            exit 0
          fi
          git add results/
          git commit -m "Weekly leaderboard run $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
